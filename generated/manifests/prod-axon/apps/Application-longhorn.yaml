apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  name: longhorn
  namespace: argocd
spec:
  destination:
    namespace: longhorn-system
    server: https://kubernetes.default.svc
  ignoreDifferences:
    - group: longhorn.io
      jsonPointers:
        - /status
        - /spec/syncRequestedAt
        - /spec/credentialSecret
      kind: BackupTarget
      name: default
      namespace: longhorn-system
  project: default
  source:
    path: ./generated/manifests/prod-axon/longhorn
    repoURL: https://github.com/sini/nix-config.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
