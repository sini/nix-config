apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argocd-application-controller
  namespace: argocd
spec:
  endpoints:
    - port: http-metrics
      relabelings:
        - action: replace
          replacement: argocd-metrics
          targetLabel: job
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-metrics
