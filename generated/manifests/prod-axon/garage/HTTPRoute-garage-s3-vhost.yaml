apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: garage-s3-vhost
  namespace: garage
spec:
  hostnames:
    - '*.s3.json64.dev'
  parentRefs:
    - name: default-gateway
      namespace: gateways
      sectionName: s3-json64-dev-https
  rules:
    - backendRefs:
        - name: garage
          port: 3900
