apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-garage-admin-ingress
  namespace: garage
spec:
  description: Admin API (3903) ingress from the garage namespace (operator + UI).
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: garage
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: garage
      toPorts:
        - ports:
            - port: "3903"
              protocol: TCP
