apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    app.kubernetes.io/instance: romm
    app.kubernetes.io/name: romm
    recurring-job-group.longhorn.io/media-config: enabled
  name: romm
  namespace: media
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: longhorn
