apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-dns-egress-lidarr
  namespace: media
spec:
  description: Allow lidarr to resolve via kube-dns.
  egress:
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: lidarr
