apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: whisparr
    app.kubernetes.io/name: whisparr
  name: whisparr
  namespace: media
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: whisparr
      app.kubernetes.io/name: whisparr
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/configMaps: 338ba9a7672645e6a1c0c7e7d3b2732a8c7fc42e7b5cbdb99ec750773000eb89
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: whisparr
        app.kubernetes.io/name: whisparr
        den.observability/file-tailed: "true"
    spec:
      automountServiceAccountToken: false
      containers:
        - args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/config/.alloy
            - --server.http.listen-addr=127.0.0.1:12345
          image: docker.io/grafana/alloy@sha256:1bc130e909116a4bf950eb5187a346007d3b796f96832b529acb14a64e41230f
          name: logtail
          securityContext:
            runAsGroup: 65536
            runAsUser: 1027
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /data
              name: data
            - mountPath: /etc/alloy/config.alloy
              name: logtail
              readOnly: true
              subPath: config.alloy
            - mountPath: /config/MediaCover
              name: metadata
              subPath: media/metadata/whisparr/MediaCover
            - mountPath: /scratch
              name: scratch
        - env:
            - name: PGID
              value: "65536"
            - name: PUID
              value: "1027"
            - name: TZ
              value: America/Los_Angeles
            - name: WHISPARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  key: whisparr
                  name: media-arr-api-keys
            - name: WHISPARR__AUTH__METHOD
              value: External
            - name: WHISPARR__LOG__ROTATE
              value: "2"
            - name: WHISPARR__LOG__SIZELIMIT
              value: "1"
            - name: WHISPARR__POSTGRES__HOST
              value: media-pg-rw
            - name: WHISPARR__POSTGRES__LOGDB
              value: whisparr-log
            - name: WHISPARR__POSTGRES__MAINDB
              value: whisparr-main
            - name: WHISPARR__POSTGRES__PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: media-pg-whisparr-password
            - name: WHISPARR__POSTGRES__PORT
              value: "5432"
            - name: WHISPARR__POSTGRES__USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: media-pg-whisparr-password
          image: ghcr.io/hotio/whisparr:v2-2.2.0-release.108
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /ping
              port: 6969
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          name: main
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ping
              port: 6969
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /data
              name: data
            - mountPath: /config/MediaCover
              name: metadata
              subPath: media/metadata/whisparr/MediaCover
            - mountPath: /scratch
              name: scratch
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: whisparr
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: whisparr
        - name: data
          persistentVolumeClaim:
            claimName: media-data-nfs
        - configMap:
            name: whisparr
          name: logtail
        - name: metadata
          persistentVolumeClaim:
            claimName: media-data-nfs
        - name: scratch
          persistentVolumeClaim:
            claimName: media-scratch-nfs
