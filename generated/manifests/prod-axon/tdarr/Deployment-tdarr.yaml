apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: tdarr
    app.kubernetes.io/name: tdarr
  name: tdarr
  namespace: media
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: tdarr
      app.kubernetes.io/name: tdarr
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: tdarr
        app.kubernetes.io/name: tdarr
    spec:
      automountServiceAccountToken: false
      containers:
        - env:
            - name: LOG_LEVEL
              value: warn
            - name: PROMETHEUS_PORT
              value: "9090"
            - name: TDARR_URL
              value: http://localhost:8265
          image: docker.io/homeylab/tdarr-exporter@sha256:07bfc1b72ecec73a343be2007c22373b6e15acbdbecdd29545ab5a03ca21ca69
          name: exportarr
          ports:
            - containerPort: 9090
              name: metrics
          volumeMounts:
            - mountPath: /app/server
              name: config
            - mountPath: /app/configs
              name: config
            - mountPath: /app/logs
              name: config
            - mountPath: /data
              name: data
              readOnly: true
        - env:
            - name: PGID
              value: "65536"
            - name: PUID
              value: "1027"
            - name: TZ
              value: America/Los_Angeles
            - name: inContainer
              value: "true"
            - name: internalNode
              value: "false"
            - name: serverIP
              value: 0.0.0.0
            - name: serverPort
              value: "8266"
            - name: webUIPort
              value: "8265"
          image: ghcr.io/haveagitgat/tdarr@sha256:71360670ac0c39e1bb8daf2b0c5c9ebb92b5d41e79c54128f2cea5bbdc32ddf2
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8265
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          name: main
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: 8265
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /app/server
              name: config
            - mountPath: /app/configs
              name: config
            - mountPath: /app/logs
              name: config
            - mountPath: /data
              name: data
              readOnly: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: tdarr
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: tdarr
        - name: data
          persistentVolumeClaim:
            claimName: media-data-nfs
