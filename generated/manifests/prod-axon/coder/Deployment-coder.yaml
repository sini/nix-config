apiVersion: apps/v1
kind: Deployment
metadata:
  annotations: {}
  labels:
    app.kubernetes.io/instance: coder
    app.kubernetes.io/name: coder
    app.kubernetes.io/part-of: coder
  name: coder
  namespace: coder
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: coder
      app.kubernetes.io/name: coder
  template:
    metadata:
      annotations:
        app.kubernetes.io/component: coderd
      labels:
        app.kubernetes.io/instance: coder
        app.kubernetes.io/name: coder
        app.kubernetes.io/part-of: coder
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - coder
                topologyKey: kubernetes.io/hostname
              weight: 1
      containers:
        - args:
            - server
          command:
            - /opt/coder
          env:
            - name: CODER_HTTP_ADDRESS
              value: 0.0.0.0:8080
            - name: CODER_PROMETHEUS_ADDRESS
              value: 0.0.0.0:2112
            - name: CODER_PPROF_ADDRESS
              value: 0.0.0.0:6060
            - name: KUBE_POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: CODER_DERP_SERVER_RELAY_URL
              value: http://$(KUBE_POD_IP):8080
            - name: CODER_ACCESS_URL
              value: https://coder.json64.dev
            - name: CODER_PG_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  key: url
                  name: coder-pg-dsn
            - name: CODER_OIDC_ISSUER_URL
              value: https://idm.json64.dev/oauth2/openid/coder
            - name: CODER_OIDC_CLIENT_ID
              value: coder
            - name: CODER_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: client-secret
                  name: coder-oidc-client-secret
            - name: CODER_OIDC_SCOPES
              value: openid,profile,email,groups
            - name: CODER_OIDC_USER_ROLE_FIELD
              value: groups
            - name: CODER_OIDC_USER_ROLE_MAPPING
              value: '{"admin":["owner"]}'
            - name: CODER_PROVISIONER_DAEMONS
              value: "0"
            - name: CODER_PROVISIONER_DAEMON_PSK
              valueFrom:
                secretKeyRef:
                  key: psk
                  name: coder-provisioner-psk
          image: ghcr.io/coder/coder:v2.34.4
          imagePullPolicy: IfNotPresent
          lifecycle: {}
          name: coder
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
              scheme: HTTP
            initialDelaySeconds: 0
          resources:
            limits:
              cpu: 2000m
              memory: 4096Mi
            requests:
              cpu: 2000m
              memory: 4096Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          volumeMounts: []
      restartPolicy: Always
      serviceAccountName: coder
      terminationGracePeriodSeconds: 60
      volumes: []
