apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-media-pg-internal
  namespace: media
spec:
  description: 'media-pg ingress: app clients (5432), peer replication (5432/8000), CNPG operator status (8000).'
  endpointSelector:
    matchLabels:
      cnpg.io/cluster: media-pg
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: media
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            cnpg.io/cluster: media-pg
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
            - port: "8000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
