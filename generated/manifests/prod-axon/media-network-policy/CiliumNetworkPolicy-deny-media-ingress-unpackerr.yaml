apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: deny-media-ingress-unpackerr
  namespace: media
spec:
  description: Default-deny all ingress to unpackerr (no inbound callers).
  enableDefaultDeny:
    ingress: true
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: unpackerr
  ingress: []
