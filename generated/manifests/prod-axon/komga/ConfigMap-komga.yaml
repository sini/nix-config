apiVersion: v1
data:
  config.alloy: |-
    logging {
      level = "warn"
    }

    local.file_match "logs" {
      path_targets = [{
        "__path__"  = "/config/logs/komga.log",
        "app"       = "komga",
        "namespace" = "media",
      }]
    }

    loki.source.file "logs" {
      targets    = local.file_match.logs.targets
      forward_to = [loki.process.logs.receiver]
    }

    loki.process "logs" {
      stage.regex {
        expression = "\\s(?P<level>TRACE|DEBUG|INFO|WARN|ERROR|FATAL)\\s"
      }

      stage.labels {
        values = {
          level = "",
        }
      }

      // Bound stream cardinality: replace the raw per-file `filename`
      // provenance label with a static app-level `log_file` label, then
      // drop the raw path.
      stage.static_labels {
        values = {
          log_file = "komga",
        }
      }

      stage.label_drop {
        values = ["filename"]
      }

      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
      }
    }
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: komga
    app.kubernetes.io/name: komga
  name: komga
  namespace: media
