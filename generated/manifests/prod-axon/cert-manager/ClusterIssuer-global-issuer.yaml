apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: global-issuer
spec:
  acme:
    privateKeySecretRef:
      name: global-issuer-account-key
    server: https://acme-v02.api.letsencrypt.org./directory
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              key: cloudflare-api-token
              name: global-secret
