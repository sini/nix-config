apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/controller: main
    app.kubernetes.io/instance: prowlarr
    app.kubernetes.io/name: prowlarr
  name: prowlarr
  namespace: media
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/controller: main
      app.kubernetes.io/instance: prowlarr
      app.kubernetes.io/name: prowlarr
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        checksum/configMaps: f99213ddac6f6c6d416d85e6fd2e71564846f70523f8bc1d80fca7fb9a891070
      labels:
        app.kubernetes.io/controller: main
        app.kubernetes.io/instance: prowlarr
        app.kubernetes.io/name: prowlarr
        den.observability/file-tailed: "true"
    spec:
      automountServiceAccountToken: false
      containers:
        - args:
            - prowlarr
          env:
            - name: APIKEY
              valueFrom:
                secretKeyRef:
                  key: prowlarr
                  name: media-arr-api-keys
            - name: PORT
              value: "9707"
            - name: URL
              value: http://localhost:9696
          image: ghcr.io/onedr0p/exportarr@sha256:320b0ea7399f4b9af4741dcdddd7d40c05c36b0359679305d8a54df4e97065df
          name: exportarr
          ports:
            - containerPort: 9707
              name: metrics
          volumeMounts:
            - mountPath: /config
              name: config
        - args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/config/.alloy
            - --server.http.listen-addr=127.0.0.1:12345
          image: docker.io/grafana/alloy@sha256:1bc130e909116a4bf950eb5187a346007d3b796f96832b529acb14a64e41230f
          name: logtail
          securityContext:
            runAsGroup: 65536
            runAsUser: 1027
          volumeMounts:
            - mountPath: /config
              name: config
            - mountPath: /etc/alloy/config.alloy
              name: logtail
              readOnly: true
              subPath: config.alloy
        - env:
            - name: PGID
              value: "65536"
            - name: PROWLARR__AUTH__APIKEY
              valueFrom:
                secretKeyRef:
                  key: prowlarr
                  name: media-arr-api-keys
            - name: PROWLARR__AUTH__METHOD
              value: External
            - name: PROWLARR__LOG__ROTATE
              value: "2"
            - name: PROWLARR__LOG__SIZELIMIT
              value: "1"
            - name: PROWLARR__POSTGRES__HOST
              value: media-pg-rw
            - name: PROWLARR__POSTGRES__LOGDB
              value: prowlarr-log
            - name: PROWLARR__POSTGRES__MAINDB
              value: prowlarr-main
            - name: PROWLARR__POSTGRES__PASSWORD
              valueFrom:
                secretKeyRef:
                  key: password
                  name: media-pg-prowlarr-password
            - name: PROWLARR__POSTGRES__PORT
              value: "5432"
            - name: PROWLARR__POSTGRES__USER
              valueFrom:
                secretKeyRef:
                  key: username
                  name: media-pg-prowlarr-password
            - name: PUID
              value: "1027"
            - name: TZ
              value: America/Los_Angeles
          image: lscr.io/linuxserver/prowlarr:2.4.0
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: /ping
              port: 9696
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          name: main
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ping
              port: 9696
              scheme: HTTP
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 1
          volumeMounts:
            - mountPath: /config
              name: config
      dnsPolicy: ClusterFirst
      enableServiceLinks: false
      hostIPC: false
      hostNetwork: false
      hostPID: false
      serviceAccountName: prowlarr
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: prowlarr
        - configMap:
            name: prowlarr
          name: logtail
