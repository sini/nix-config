apiVersion: v1
data:
  config.alloy: |-
    logging {
      level = "warn"
    }

    local.file_match "logs" {
      path_targets = [{
        "__path__"  = "/config/logs/sonarr.txt",
        "app"       = "sonarr",
        "namespace" = "media",
      }]
    }

    loki.source.file "logs" {
      targets    = local.file_match.logs.targets
      forward_to = [loki.process.logs.receiver]
    }

    loki.process "logs" {
      stage.regex {
        expression = "\\|(?P<level>Trace|Debug|Info|Warn|Error|Fatal)\\|"
      }

      stage.labels {
        values = {
          level = "",
        }
      }

      // Bound stream cardinality: replace the per-file `filename`
      // provenance label (one stream per rotated file) with a static
      // app-level `log_file` label, then drop the raw path.
      stage.static_labels {
        values = {
          log_file = "sonarr",
        }
      }

      stage.label_drop {
        values = ["filename"]
      }

      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
      }
    }
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: sonarr
    app.kubernetes.io/name: sonarr
  name: sonarr
  namespace: media
