apiVersion: v1
data:
  dashboardproviders.yaml: |
    apiVersion: 1
    providers:
    - disableDeletion: false
      editable: true
      folder: Imported
      name: imported
      options:
        path: /var/lib/grafana/dashboards/imported
      orgId: 1
      type: file
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - access: proxy
      isDefault: true
      name: Prometheus
      type: prometheus
      url: http://kube-prometheus-stack-prometheus.monitoring:9090
    - access: proxy
      name: Loki
      type: loki
      url: http://loki.monitoring:3100
  download_dashboards.sh: "#!/usr/bin/env sh\nset -euf\nmkdir -p /var/lib/grafana/dashboards/imported\n\ncurl -skf \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\" \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://grafana.com/api/dashboards/14584/revisions/1/download\" \\\n  | sed '/-- .* --/! s/\"datasource\":.*,/\"datasource\": \"Prometheus\",/g' \\\n> \"/var/lib/grafana/dashboards/imported/argo-cd.json\"\n  \ncurl -skf \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\" \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://grafana.com/api/dashboards/11001/revisions/1/download\" \\\n  | sed '/-- .* --/! s/\"datasource\":.*,/\"datasource\": \"Prometheus\",/g' \\\n> \"/var/lib/grafana/dashboards/imported/cert-manager.json\"\n  \ncurl -skf \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\" \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://raw.githubusercontent.com/envoyproxy/gateway/v1.8.1/charts/gateway-addons-helm/dashboards/envoy-clusters.json\" \\\n> \"/var/lib/grafana/dashboards/imported/envoy-clusters.json\"\n  \ncurl -skf \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\" \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://raw.githubusercontent.com/envoyproxy/gateway/v1.8.1/charts/gateway-addons-helm/dashboards/envoy-gateway-global.json\" \\\n> \"/var/lib/grafana/dashboards/imported/envoy-gateway-global.json\"\n  \ncurl -skf \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\" \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://raw.githubusercontent.com/envoyproxy/gateway/v1.8.1/charts/gateway-addons-helm/dashboards/envoy-proxy-global.json\" \\\n> \"/var/lib/grafana/dashboards/imported/envoy-proxy-global.json\"\n  \ncurl -skf \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\" \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://raw.githubusercontent.com/envoyproxy/gateway/v1.8.1/charts/gateway-addons-helm/dashboards/resources-monitor.gen.json\" \\\n> \"/var/lib/grafana/dashboards/imported/envoy-resources-monitor.json\"\n  \ncurl -skf \\\n--connect-timeout 60 \\\n--max-time 60 \\\n-H \"Accept: application/json\" \\\n-H \"Content-Type: application/json;charset=UTF-8\" \\\n  \"https://grafana.com/api/dashboards/13032/revisions/6/download\" \\\n  | sed '/-- .* --/! s/\"datasource\":.*,/\"datasource\": \"Prometheus\",/g' \\\n> \"/var/lib/grafana/dashboards/imported/longhorn.json\"\n"
  grafana.ini: |
    [analytics]
    check_for_updates = false
    reporting_enabled = false
    [auth.generic_oauth]
    allow_assign_grafana_admin = true
    allow_sign_up = true
    api_url = https://idm.json64.dev/oauth2/openid/grafana-k8s/userinfo
    auth_url = https://idm.json64.dev/ui/oauth2
    auto_login = true
    client_id = grafana-k8s
    enabled = true
    icon = signin
    login_attribute_path = preferred_username
    name = KanIDM
    role_attribute_path = contains(groups[*], 'server_admin') && 'GrafanaAdmin' || contains(groups[*], 'admin') && 'Admin' || contains(groups[*], 'editor') && 'Editor' || 'Viewer'
    role_attribute_strict = false
    scopes = openid email profile
    skip_org_role_sync = false
    token_url = https://idm.json64.dev/oauth2/token
    use_pkce = true
    use_refresh_token = true
    [database]
    host = monitoring-pg-rw.monitoring:5432
    name = grafana
    ssl_mode = require
    type = postgres
    user = grafana
    [log]
    mode = console
    [paths]
    data = /var/lib/grafana/
    logs = /var/log/grafana
    plugins = /var/lib/grafana/plugins
    provisioning = /etc/grafana/provisioning
    [server]
    domain = grafana-k8s.json64.dev
    root_url = https://grafana-k8s.json64.dev
    [unified_storage]
    index_path = /var/lib/grafana-search/bleve
    [users]
    allow_sign_up = false
    auto_assign_org_role = Viewer
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/name: grafana
  name: grafana
  namespace: monitoring
