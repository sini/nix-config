apiVersion: gateway.networking.k8s.io/v1
kind: ReferenceGrant
metadata:
  name: allow-gateway-to-cert-tls
  namespace: certs
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: gateways
  to:
    - group: ""
      kind: Secret
      name: json64-com-wildcard-tls
    - group: ""
      kind: Secret
      name: json64-dev-wildcard-tls
    - group: ""
      kind: Secret
      name: json64-net-wildcard-tls
    - group: ""
      kind: Secret
      name: sinistar-io-wildcard-tls
    - group: ""
      kind: Secret
      name: sinistar-org-wildcard-tls
    - group: ""
      kind: Secret
      name: zeroday-pub-wildcard-tls
    - group: ""
      kind: Secret
      name: zeroday-run-wildcard-tls
