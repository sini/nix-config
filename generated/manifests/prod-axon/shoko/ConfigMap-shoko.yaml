apiVersion: v1
data:
  config.alloy: |-
    logging {
      level = "warn"
    }

    local.file_match "logs" {
      path_targets = [{
        "__path__"  = "/home/shoko/.shoko/Shoko.CLI/logs/*.log",
        "app"       = "shoko",
        "namespace" = "media",
      }]
    }

    loki.source.file "logs" {
      targets    = local.file_match.logs.targets
      forward_to = [loki.process.logs.receiver]
    }

    loki.process "logs" {
      stage.regex {
        expression = "\\]\\s(?P<level>Trace|Debug|Info|Warn|Error|Fatal)\\|"
      }

      stage.labels {
        values = {
          level = "",
        }
      }

      // Bound stream cardinality: shoko names each day's log by date, so
      // the raw `filename` label grows daily. Collapse it to a static
      // app-level `log_file` label and drop the raw path.
      stage.static_labels {
        values = {
          log_file = "shoko",
        }
      }

      stage.label_drop {
        values = ["filename"]
      }

      forward_to = [loki.write.default.receiver]
    }

    loki.write "default" {
      endpoint {
        url = "http://loki.monitoring.svc:3100/loki/api/v1/push"
      }
    }
kind: ConfigMap
metadata:
  labels:
    app.kubernetes.io/instance: shoko
    app.kubernetes.io/name: shoko
  name: shoko
  namespace: media
