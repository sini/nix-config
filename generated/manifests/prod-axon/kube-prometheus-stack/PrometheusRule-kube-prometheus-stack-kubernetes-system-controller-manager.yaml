apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  labels:
    app: kube-prometheus-stack
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/part-of: kube-prometheus-stack
    chart: kube-prometheus-stack-86.0.1
    heritage: Helm
    release: kube-prometheus-stack
  name: kube-prometheus-stack-kubernetes-system-controller-manager
  namespace: monitoring
spec:
  groups:
    - name: kubernetes-system-controller-manager
      rules:
        - alert: KubeControllerManagerDown
          annotations:
            description: KubeControllerManager has disappeared from Prometheus target discovery.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubecontrollermanagerdown
            summary: Target disappeared from Prometheus target discovery.
          expr: absent(up{job="kube-controller-manager"})
          for: 15m
          labels:
            severity: critical
        - alert: KubeControllerManagerInstanceUnreachable
          annotations:
            description: A KubeControllerManager instance has been unreachable for more than 15 minutes.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubecontrollermanagerinstanceunreachable
            summary: KubeControllerManager instance is unreachable.
          expr: up{job="kube-controller-manager"} == 0
          for: 15m
          labels:
            severity: warning
