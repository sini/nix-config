apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: envoy-proxies
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - gateways
  podMetricsEndpoints:
    - path: /stats/prometheus
      port: metrics
  selector:
    matchLabels:
      app.kubernetes.io/component: proxy
