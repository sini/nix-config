apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: unpackerr
  namespace: media
spec:
  podMetricsEndpoints:
    - interval: 30s
      path: /metrics
      port: metrics
      relabelings:
        - sourceLabels:
            - __meta_kubernetes_pod_label_app_kubernetes_io_name
          targetLabel: instance
  selector:
    matchLabels:
      app.kubernetes.io/name: unpackerr
