apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rook-ceph-dashboard
  namespace: longhorn-system
spec:
  hostnames:
    - longhorn.zeroday.run
  parentRefs:
    - name: default-gateway
      namespace: gateways
      sectionName: zeroday-run-https
  rules:
    - backendRefs:
        - name: longhorn-frontend
          port: 80
