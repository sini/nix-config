apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  hostnames:
    - argocd.zeroday.run
  parentRefs:
    - name: default-gateway
      namespace: kube-system
      sectionName: zeroday-run-https
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80
