allowVolumeExpansion: true
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: vault-nfs
mountOptions:
  - proto=tcp
  - noresvport
  - nfsvers=4.1
  - noauto
  - noatime
parameters:
  server: 10.10.10.10
  share: /volume2/data
  subDir: ${pvc.metadata.namespace}/${pvc.metadata.name}/${pv.metadata.name}
provisioner: nfs.csi.k8s.io
reclaimPolicy: Retain
volumeBindingMode: Immediate
