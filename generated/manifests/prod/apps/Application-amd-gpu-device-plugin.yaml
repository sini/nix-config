apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: amd-gpu-device-plugin
  namespace: argocd
spec:
  destination:
    namespace: kube-system
    server: https://kubernetes.default.svc
  project: default
  source:
    path: ./generated/manifests/prod/amd-gpu-device-plugin
    repoURL: https://github.com/sini/nix-config.git
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
