apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/instance: rook-ceph
    app.kubernetes.io/name: ceph-csi
  name: ceph-csi-cephconnection-viewer-role
rules:
  - apiGroups:
      - csi.ceph.io
    resources:
      - cephconnections
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - csi.ceph.io
    resources:
      - cephconnections/status
    verbs:
      - get
